<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tico e teco: duel - Início</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <main class="start-screen">
    <section class="start-card">
      <h1>Tico e teco: duel</h1>
      <p class="subtitle">Em 60 segundos, vence quem deixar o pet com a melhor pontuação.</p>

      <form id="startForm" class="start-form">
        <div class="field">
          <label for="player1">Nome do Jogador 1</label>
          <input type="text" id="player1" maxlength="20" placeholder="Ex.: Ana">
        </div>

        <div class="field">
          <label for="player2">Nome do Jogador 2</label>
          <input type="text" id="player2" maxlength="20" placeholder="Ex.: Bia">
        </div>

        <button type="submit" class="start-btn">Iniciar Jogo</button>
      </form>
    </section>
  </main>

  <script src="js/index.js"></script>
</body>
</html>
